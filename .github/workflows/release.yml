name: Release

on:
  push:
    branches:
      - master
    paths:
      - "src/**"
      - "frontend/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "docker/**"
      - ".github/workflows/release.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "正式版版本号，例如 0.2.0；留空则自动生成 snapshot 版本"
        required: false
        default: ""
      prerelease:
        description: "手动发布时是否标记为预发布"
        required: false
        type: boolean
        default: false
      release_notes:
        description: "手动追加的发布说明（可选）"
        required: false
        default: ""

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    name: Determine release metadata
    runs-on: ubuntu-latest
    outputs:
      base_version: ${{ steps.meta.outputs.base_version }}
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      image: ${{ steps.meta.outputs.image }}
      release_name: ${{ steps.meta.outputs.release_name }}
      release_kind: ${{ steps.meta.outputs.release_kind }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      channel_tag: ${{ steps.meta.outputs.channel_tag }}
      sha_short: ${{ steps.meta.outputs.sha_short }}
      published_at: ${{ steps.meta.outputs.published_at }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          BASE_VERSION=$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n1)
          if [[ -z "$BASE_VERSION" ]]; then
            echo "failed to determine base version from Cargo.toml" >&2
            exit 1
          fi

          OWNER_LOWER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          SHA_SHORT=$(git rev-parse --short=7 HEAD)
          PUBLISHED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
            RELEASE_KIND="manual"
            if [[ "${{ inputs.prerelease }}" == "true" ]]; then
              PRERELEASE="true"
              CHANNEL_TAG="rc"
              RELEASE_NAME="rflush ${VERSION} (prerelease)"
            else
              PRERELEASE="false"
              CHANNEL_TAG="latest"
              RELEASE_NAME="rflush ${VERSION}"
            fi
          else
            UTC_STAMP=$(date -u +%Y%m%d.%H%M)
            VERSION="${BASE_VERSION}-snapshot.${UTC_STAMP}.${GITHUB_RUN_NUMBER}"
            RELEASE_KIND="snapshot"
            PRERELEASE="true"
            CHANNEL_TAG="edge"
            RELEASE_NAME="rflush ${VERSION} (snapshot)"
          fi

          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/$OWNER_LOWER/rflush" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "release_kind=$RELEASE_KIND" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "channel_tag=$CHANNEL_TAG" >> "$GITHUB_OUTPUT"
          echo "sha_short=$SHA_SHORT" >> "$GITHUB_OUTPUT"
          echo "published_at=$PUBLISHED_AT" >> "$GITHUB_OUTPUT"

  frontend:
    name: Build frontend
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ needs.prepare.outputs.version }}

      - name: Upload frontend dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  build:
    name: Build binary ${{ matrix.target }}
    needs: [prepare, frontend]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            use_cross: true

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive: tar.gz
            use_cross: true

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            use_cross: false

          - os: windows-latest
            target: aarch64-pc-windows-msvc
            archive: zip
            use_cross: false

    steps:
      - uses: actions/checkout@v6

      - name: Download frontend dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build binary
        run: |
          ${{ matrix.use_cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            BIN="target/${{ matrix.target }}/release/rflush.exe"
            ARCHIVE="rflush-${{ needs.prepare.outputs.version }}-${{ matrix.target }}.zip"
            7z a "$ARCHIVE" "$BIN"
          else
            BIN="target/${{ matrix.target }}/release/rflush"
            ARCHIVE="rflush-${{ needs.prepare.outputs.version }}-${{ matrix.target }}.tar.gz"
            tar czf "$ARCHIVE" -C "$(dirname "$BIN")" "$(basename "$BIN")"
          fi
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: rflush-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}
          retention-days: 7

  docker-linux:
    name: Docker linux ${{ matrix.platform }}
    needs: [prepare, build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            platform: linux/amd64
            suffix: linux-amd64

          - target: aarch64-unknown-linux-musl
            platform: linux/arm64
            suffix: linux-arm64

    steps:
      - uses: actions/checkout@v6

      - name: Download binary artifact
        uses: actions/download-artifact@v8
        with:
          name: rflush-${{ matrix.target }}
          path: docker/linux

      - name: Extract binary artifact
        shell: bash
        run: |
          cd docker/linux
          tar xzf rflush-${{ needs.prepare.outputs.version }}-${{ matrix.target }}.tar.gz
          chmod +x rflush

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker tags
        id: docker_meta
        shell: bash
        run: |
          set -euo pipefail
          TAGS="${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}-${{ matrix.suffix }}"
          if [[ -n "${{ needs.prepare.outputs.channel_tag }}" ]]; then
            TAGS="$TAGS"$'\n'"${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.channel_tag }}-${{ matrix.suffix }}"
          fi
          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: docker/linux
          file: docker/linux/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}

  docker-linux-manifest:
    name: Docker linux manifest
    needs: [prepare, docker-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch linux manifest
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            -t "${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}" \
            "${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}-linux-amd64" \
            "${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}-linux-arm64"

          if [[ -n "${{ needs.prepare.outputs.channel_tag }}" ]]; then
            docker buildx imagetools create \
              -t "${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.channel_tag }}" \
              "${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}-linux-amd64" \
              "${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}-linux-arm64"
          fi

  release:
    name: Create Release
    needs: [prepare, build, docker-linux-manifest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all binary artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: rflush-*
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate release notes
        shell: bash
        env:
          MANUAL_RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          set -euo pipefail

          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="${{ needs.prepare.outputs.tag }}"
          RELEASE_KIND="${{ needs.prepare.outputs.release_kind }}"
          IMAGE="${{ needs.prepare.outputs.image }}"
          CHANNEL_TAG="${{ needs.prepare.outputs.channel_tag }}"
          SHA_SHORT="${{ needs.prepare.outputs.sha_short }}"
          PUBLISHED_AT="${{ needs.prepare.outputs.published_at }}"

          PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -v "^${TAG}$" | head -n1 || true)
          if [[ -n "$PREVIOUS_TAG" ]]; then
            CHANGE_RANGE="${PREVIOUS_TAG}..HEAD"
            CHANGE_TITLE="## 变更摘要"
          else
            CHANGE_RANGE="HEAD"
            CHANGE_TITLE="## 变更摘要（首次发布，无历史标签）"
          fi

          {
            echo "# ${TAG}"
            echo
            echo "## 发版信息"
            echo "- 版本号：\`${VERSION}\`"
            echo "- 发布类型：\`${RELEASE_KIND}\`"
            echo "- 提交：\`${SHA_SHORT}\`"
            echo "- 分支：\`${GITHUB_REF_NAME}\`"
            echo "- 发布时间（UTC）：\`${PUBLISHED_AT}\`"
            echo
            echo "## 交付物"
            echo "- GitHub Release 附件：Linux / Windows 多架构二进制包"
            echo "- 校验文件：\`SHA256SUMS.txt\`"
            echo "- Docker 镜像：\`${IMAGE}:${VERSION}\`"
            if [[ -n "$CHANNEL_TAG" ]]; then
              echo "- 渠道镜像标签：\`${IMAGE}:${CHANNEL_TAG}\`"
            fi
            echo
            echo "## 版本策略"
            echo "- 自动推送到 \`master\`：生成 snapshot 预发布，版本格式为 \`<base>-snapshot.<UTC时间>.<run_number>\`"
            echo "- 手动触发并填写 \`version\`：生成手动发布版本，适合正式版或指定版本补发"
            echo "- Docker 渠道标签：snapshot 使用 \`edge\`，正式版使用 \`latest\`，手动预发布使用 \`rc\`"
            echo
            echo "$CHANGE_TITLE"
            if [[ -n "$PREVIOUS_TAG" ]]; then
              echo "- 对比范围：\`${PREVIOUS_TAG}..${TAG}\`"
            fi
            git log --no-merges --pretty=format:"- %s (%h)" "$CHANGE_RANGE" || true
            echo
            if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${MANUAL_RELEASE_NOTES}" ]]; then
              echo
              echo "## 手动补充说明"
              printf '%s\n' "${MANUAL_RELEASE_NOTES}"
            fi
          } > artifacts/RELEASE_NOTES.md

          cat artifacts/RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          body_path: artifacts/RELEASE_NOTES.md
          files: |
            artifacts/*
          draft: false
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          target_commitish: ${{ github.sha }}
